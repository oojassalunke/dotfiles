# Scott Stanfield
# https://hamvocke.com/blog/a-guide-to-customizing-your-tmux-conf/

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins'

set-option -g default-terminal 'tmux-256color'
set-option -g terminal-overrides ",*:RGB"

# prefix: Use ctrl-o instead of ctrl-b 
unbind-key C-b               # pass ctrl-o down to other apps
set        -g  prefix C-o    # use ctrl-o as our <leader>
# bind       C-o send-prefix

set -g base-index 1               # start indexing windows at 1 instead of 0
set -g detach-on-destroy off      # don't exit from tmux when closing a session
set -g escape-time 0              # zero-out escape time delay
set -g history-limit 1000000      # increase history size (from 2,000)
set -g renumber-windows on        # renumber all windows when any window is closed
set -g set-clipboard on           # use system clipboard
set -g default-command "${SHELL}" # tmux spawns a login shell by default resulting in negative side effects
set -g mode-keys vi               # prefix + [   (then vim nav, space highlight, yank, enter)
set -g display-time 4000          # status messages visible for 4s
set -g status-interval 5          # refresh status bar every 5s
set -g mouse on
set -g status-position top        # moving to top to align with macbook notch


set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

#####################
# session / window management
#####################
bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach
bind *  list-clients
bind S  choose-session
bind :  command-prompt

#####################
# pane navigation (vim-style)
#####################
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# quick pane cycling (ctrl-o twice quickly)
bind ^O select-pane -t :.+

#####################
# pane splitting
#####################
unbind %
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

#####################
# pane resizing
#####################
# z==zoom

bind z resize-pane -Z
bind H resize-pane -L 10
bind J resize-pane -D 10
bind K resize-pane -U 10
bind L resize-pane -R 10

#####################
# pane utilities
#####################
bind x swap-pane -D

#####################
# misc keybindings
#####################
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded tmux.conf"
bind , command-prompt "rename-window %%"

# Fix clear screen / yank
bind C-l send-keys 'C-l'
bind C-k send-keys 'C-k'

# copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection

#####################
# plugins
#####################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'        # prefix-y
set -g @plugin 'dracula/tmux'

set -g @dracula-show-left-icon "#{?HOST_ICON,#{HOST_ICON},☉}"
set -g @dracula-left-icon-padding 2
set -g @dracula-show-powerline false
set -g @dracula-show-timezone false
set -g @dracula-show-border-contrast true
set -g @dracula-plugins "ssh-session time"

run '~/.local/share/tmux/plugins/tpm/tpm'
