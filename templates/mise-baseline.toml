# Baseline mise tools — installed on every machine by istow.sh.
# Symlinked to ~/.config/mise/conf.d/baseline.toml so that mise's own
# ~/.config/mise/config.toml stays a real, untracked scratchpad for
# `mise use -g <tool>` experiments. Promote keepers from config.toml into
# this file (or into templates/extras.toml for the opt-in pack).

[tools]
bat = "0.26.1"
bun = "1.3.13"
delta = "0.19.2"
difftastic = "0.69.0"
duf = "0.9.1"
dust = "1.2.4"
eza = "0.23.4"
fd = "10.4.2"
fzf = "0.72.0"
glow = "2.1.2"
jq = "1.8.1"
lazygit = "0.61.1"
neovim = "0.12.2"
rg = "15.1.0"
tmux = "3.6a"
uv = "0.11.13"
yq = "4.53.2"

[settings.pipx]
uvx = true
